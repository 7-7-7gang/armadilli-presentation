# A Whirlwind Tour of <br><span style="color: var(--accent);">Energy Markets</span>
### Forecasting • Interdependency • Capital Efficiency
**Group:** ARMAdilli | **Date:** May 2026

---

## 1. Introduction & Context
<div class="grid-2">
    <div>
        <h3>Market Environment</h3>
        <p>The 2021-2026 period redefined energy stability. Markets are now in a <b>permanent stress regime</b>.</p>
        <ul>
            <li><strong>Geopolitical Shocks:</strong> Ukraine (2022) and Hormuz (2026).</li>
            <li><strong>Objective:</strong> Shift to <b>Risk Management (VaR)</b>.</li>
        </ul>
    </div>
    <div class="box">
        <h4 style="color: var(--accent); margin:0; font-size:0.9em;">Operational Goal</h4>
        <p>Optimize capital allocation by quantifying extreme loss quantiles.</p>
    </div>
</div>

---

## 2. Literature Review
<div class="grid-2">
    <div class="stat-card">
        <i class="fa-solid fa-chart-line" style="font-size:2em; color:var(--accent);"></i>
        <h3>Engle (2002)</h3>
        <p><b>DCC-GARCH:</b> Modeling time-varying correlations during market coupling.</p>
    </div>
    <div class="stat-card">
        <i class="fa-solid fa-diagram-project" style="font-size:2em; color:var(--accent);"></i>
        <h3>Diebold & Yilmaz</h3>
        <p><b>Connectedness:</b> Measuring directional volatility spillovers.</p>
    </div>
</div>

---

## 3. Data Selection
<div class="grid-2">
    <div>
        <h3>Brent Crude Dynamics</h3>
        <p>Primary benchmark showing clear <b>volatility clusters</b> during the 2022 and 2026 shocks.</p>
        <p>Log returns exhibit <b>heavy tails</b>, making Gaussian assumptions invalid.</p>
    </div>
    <div class="img-frame">
        <img src="img/plot brent.png" alt="Brent Price and Returns">
    </div>
</div>

---

## 4. Strategic Rationale
<div class="grid-2">
    <div class="box">
        <h3>Fuel Switching</h3>
        <p>Natural Gas (Henry Hub) price spikes drive demand toward oil distillates, creating non-linear <b>interdependence</b>.</p>
    </div>
    <div class="box">
        <h3>Cointegration</h3>
        <p>Heating Oil (HOIL) as a refined product follows Brent's long-term trend but adds refinery-specific shocks.</p>
    </div>
</div>

---

## 5. Data Treatment
<div class="grid-2">
    <div class="box" style="border-left: 5px solid var(--orange);">
        <h3>The Rollover Challenge</h3>
        <p>Futures exhibit artificial price jumps at contract expiration.</p>
    </div>
    <div>
        <ul>
            <li>Algorithmic <b>Roll Day</b> detection.</li>
            <li>Technical returns set to <b>zero</b>.</li>
            <li>Ensures GARCH models capture only economic shocks.</li>
        </ul>
    </div>
</div>

---

## 6. Diagnostic Analysis
<div class="grid-2">
    <div>
        <h3>Volatility Clustering</h3>
        <p>ACF and PACF of <b>squared returns</b> confirm significant ARCH effects.</p>
        <p><b>Engle ARCH Test:</b> Rejection of homoscedasticity (p < 0.001).</p>
    </div>
    <div class="img-frame">
        <img src="img/squared returns.png" alt="ACF PACF Squared Returns">
    </div>
</div>

---

## 7. Forecast Design
<div class="grid-2">
    <div class="box">
        <h3>Forecasting Horizon</h3>
        <p><b>One-step ahead forecasts</b> (except for the last one) of the Friday closing price of Brent crude oil futures.</p>
    </div>
    <div class="box">
        <h3>Methodology</h3>
        <p><b>Rolling window</b> approach.</p>
    </div>
    <div class="box">
        <h3>Data Splitting</h3>
        <p>In-sample backtest: <b>80%</b> of the observations in the training sample and <b>20%</b> in the testing sample.</p>
    </div>
    <div class="box">
        <h3>Parameter Update</h3>
        <p>Re-estimation of the parameters every <b>10 days</b>.</p>
    </div>
</div>  

---

## 8. Forecast Performance Evaluation
<div class="content-area">
    <p>Performance was assessed on both market direction (<b>DAC</b>) and quantitative error (<b>ME, MAE, RMSE</b>).</p>
    <div class="grid-2" style="margin: 30px 0;">
        <div class="img-frame">
            <img src="img/DAC.png" alt="DAC">
        </div>

</div>
