## 4. Strategic Rationale
<div class="grid-2">
    <div class="box">
        <h3>Fuel Switching</h3>
        <p>Natural Gas (Henry Hub) price spikes drive demand toward oil distillates, creating non-linear <b>interdependence</b>.</p>
    </div>
    <div class="box">
        <h3>Cointegration</h3>
        <p>Heating Oil (HOIL) as a refined product follows Brent's long-term trend but adds refinery-specific shocks.</p>
    </div>
</div>

## 5. Data Treatment
<div class="grid-2">
    <div class="box" style="border-left: 5px solid var(--orange);">
        <h3>The Rollover Challenge</h3>
        <p>Futures exhibit artificial price jumps at contract expiration.</p>
    </div>
    <div>
        <ul>
            <li>Algorithmic <b>Roll Day</b> detection.</li>
            <li>Technical returns set to <b>zero</b>.</li>
            <li>Ensures GARCH models capture only economic shocks.</li>
        </ul>
    </div>
</div>

## 7. Forecast Design
<div class="grid-2">
    <div class="box">
        <h3>Forecasting Horizon</h3>
        <p><b>One-step ahead forecasts</b> (except for the last one) of the Friday closing price of Brent crude oil futures.</p>
    </div>
    <div class="box">
        <h3>Methodology</h3>
        <p><b>Rolling window</b> approach.</p>
    </div>

    </div>
    <div class="box">
        <h3>Parameter Update</h3>
        <p>Re-estimation of the parameters every <b>10 days</b>.</p>

The Brent-Heating Oil relationship reveals <b>instantaneous, bidirectional shock transmission</b> at lag 0 under both orderings. All significant responses dissipate within 1-2 lags. <b>Natural Gas</b> exhibits statistically insignificant impulse responses, providing empirical confirmation of <b>structural price decoupling</b>. The FEVD corroborates these findings.

## 12. Correlation of Returns
<div class="content-area">
<p style="font-size: 0.72em; line-height: 1.3; margin-bottom: 10px;">
The <b>Brent-Heating Oil correlation</b> remains persistently elevated throughout the sample, consistent with <b>Crack Spread theory</b>. This high correlation experienced a major structural break in 2022 due to the Russian invasion of Ukraine. This geopolitical event triggered a massive <b>short squeeze</b> that caused a large Crack Spread widening. Despite this temporary period of price disconnection, the correlation quickly returned to its historical average, reaffirming the fundamental link between crude oil and refined products.
</p>

<div class="img-frame" style="width: 750px; height: 280px; margin: 10px auto; background: #000;">
<img src="img/dynamic_correlation.png" alt="dynamic_correlation">
</div>

<div class="box" style="padding: 15px; border-left: 5px solid var(--accent);">
<p style="font-size: 0.72em; line-height: 1.3; margin: 0;">
The correlation between <b>Natural Gas</b>, Brent, and Heating Oil remained near zero for most of the period, confirming the historical decoupling of these markets. However, starting in 2025, correlations surged due to the massive expansion of <b>U.S. LNG export capacity</b> and the 2026 closure of the <b>Strait of Hormuz</b>. Paradoxically, while global prices spiked, U.S. Henry Hub prices fell due to export bottlenecks, suggesting the increased correlation stems from <b>shared global information</b> rather than actual synchronized price movement.
</p>
